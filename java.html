<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tombol</title>
</head>

<body>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            transition: background-color 0.5s ease;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

    <body>
        <h2>Latihan Javascript</h2>
        <p> Click tombol untuk mengubah warna background</p>
        <button id="changeCollorButton">Change color</button>
    </body>
    <script>
        var button = document.getElementById("changeCollorButton");

        button.addEventListener("click", function () {
            var randomColor = "#" + Math.floor(Math.random() * 16777215).toString(16);
            document.body.style.backgroundColor = randomColor;
        });
    </script>
</body>

</html>
